<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-page">

<header>Dashboard</header>

<form id="eventForm">
    <input type="text" id="name" placeholder="Event Name" required>
    <input type="date" id="date" required>
    <input type="text" id="venue" placeholder="Venue" required>
    <input type="text" id="link" placeholder="Event Link" required>
    <button type="submit">Add Event</button>
</form>

<div id="eventList" class="event-list"></div>

<!-- IMPORTANT: YOUR FILE NAME -->
<script src="event-app.js"></script>

</body>
</html>
